<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Cameras Viewer</title>

  <!-- Open Graph metadata -->
  <meta property="og:title" content="All Cameras Viewer">
  <meta property="og:description" content="View all connected cameras in a simple web app.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://openthecamera.com/">

  <!-- GitHub link -->
  <link rel="canonical" href="https://github.com/yourusername/all-cameras-viewer">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin: 10px 0;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    video {
      width: 100%;
      border-radius: 10px;
      background: black;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .note {
      text-align: center;
      font-size: 14px;
      color: #aaa;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h1>All Cameras Viewer</h1>
  <div class="note">Click "Start Cameras" to grant camera access</div>
  <button onclick="startAllCameras()">Start Cameras</button>

  <div id="grid"></div>

  <script>
    let streams = [];

    async function startAllCameras() {
      try {
        // Request any camera once to get permission
        await navigator.mediaDevices.getUserMedia({ video: true });

        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === "videoinput");

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        // Stop old streams
        streams.forEach(stream => stream.getTracks().forEach(track => track.stop()));
        streams = [];

        for (const device of videoDevices) {
          try {
            // Use "ideal" to avoid OverconstrainedError
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { deviceId: { exact: device.deviceId } },
              audio: false
            });

            streams.push(stream);

            const video = document.createElement("video");
            video.autoplay = true;
            video.playsInline = true;
            video.srcObject = stream;

            grid.appendChild(video);
          } catch (err) {
            console.log("Could not access camera:", device.label || "Unknown", err);
          }
        }

      } catch (err) {
        console.log("Error accessing cameras:", err);
        alert("Camera access denied or no cameras found.");
      }
    }
  </script>

</body>
</html>
